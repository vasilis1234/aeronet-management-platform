<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>AeroNet Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 30px; background-color: #f0f2f5; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: #003366; color: white; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #004080; color: white; }
        button.logout { background: #b21f1f; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>✈️ AeroNet Management Dashboard</h1>
        <div>
            <span id="welcomeMsg"></span>
            <button class="logout" onclick="logout()">Έξοδος</button>
        </div>
    </div>
    
    <div class="card">
        <h2>👥 Προσωπικό (PostgreSQL) - Role: <span id="userRoleDisplay"></span></h2>
        <table id="employeeTable">
            <thead><tr><th>Όνομα</th><th>Θέση</th><th>Email</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>🛠️ QC Reports (MongoDB)</h2>
        <table id="qcTable">
            <thead><tr><th>Report ID</th><th>Inspector</th><th>Status</th><th>Notes</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // --- ΕΛΕΓΧΟΣ ΠΡΟΣΒΑΣΗΣ (RBAC) ---
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        document.getElementById('welcomeMsg').innerText = "Χρήστης: " + localStorage.getItem('userName');
        document.getElementById('userRoleDisplay').innerText = localStorage.getItem('userRole');

        const API = "https://aeronet-backend.onrender.com/api";

        // Φόρτωση Employees (PostgreSQL)
        fetch(`${API}/employees`)
            .then(r => r.json())
            .then(data => {
                const html = data.map(e => `<tr><td>${e.fullname}</td><td>${e.jobtitle}</td><td>${e.email}</td></tr>`).join('');
                document.querySelector("#employeeTable tbody").innerHTML = html;
            });

        // Φόρτωση QC Reports (MongoDB)
        fetch(`${API}/qc-reports`)
            .then(r => r.json())
            .then(data => {
                const html = data.map(r => `<tr><td>${r.reportID}</td><td>${r.inspector}</td><td>${r.status}</td><td>${r.results.notes}</td></tr>`).join('');
                document.querySelector("#qcTable tbody").innerHTML = html;
            });

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
