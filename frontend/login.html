<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroNet Login | Secure Access</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a; /* Μαύρο φόντο για Dark Tech Style */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .login-container {
            background: #161616; /* Σκούρο γκρι κάρτα */
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            width: 350px;
            text-align: center;
        }
        h2 { color: #f39c12; margin-bottom: 25px; letter-spacing: 2px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #f39c12; /* Πορτοκαλί Tech χρώμα */
            color: #0b0e14;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #e67e22; }
        #message { color: #e74c3c; margin-top: 15px; font-size: 14px; }

        /* Quick Access Panel */
        .quick-access {
            margin-top: 25px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .role-chip {
            background: #1a1f29;
            border: 1px solid #f39c12;
            color: #f39c12;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .role-chip:hover {
            background: #f39c12;
            color: #1a1f29;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>✈️ AERONET LOGIN</h2>
    <input type="text" id="email" placeholder="Email Address">
    <input type="password" id="empid" placeholder="Employee ID">
    <button onclick="handleLogin()">SECURE ACCESS</button>
    
    <div id="message"></div>

    <div class="quick-access">
        <div class="role-chip" onclick="quickFill('admin@aeronet.com', 'EMP_001')">Admin</div>
        <div class="role-chip" onclick="quickFill('inspector@aeronet.com', 'EMP_002')">Inspector</div>
        <div class="role-chip" onclick="quickFill('supply@aeronet.com', 'EMP_003')">Supply</div>
    </div>
</div>

<script>
    // Συνάρτηση για γρήγορη συμπλήρωση στην παρουσίαση
    function quickFill(email, id) {
        document.getElementById('email').value = email;
        document.getElementById('empid').value = id;
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const empid = document.getElementById('empid').value;
        const messageDiv = document.getElementById('message');

        try {
            // Κρατάμε το δικό σου URL που δουλεύει
            const response = await fetch('https://aeronet-backend.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, empid })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', data.user.fullname);
                localStorage.setItem('userRole', data.user.role);
                
                window.location.href = 'index.html';
            } else {
                messageDiv.innerText = "❌ Πρόσβαση Μη Εξουσιοδοτημένη.";
            }
        } catch (error) {
            console.error('Error:', error);
            messageDiv.innerText = "⚠️ Σφάλμα σύνδεσης.";
        }
    }
</script>

</body>
</html>
